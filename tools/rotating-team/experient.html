<div id="wrap" style="font-family: var(--font-sans, system-ui, sans-serif); color: var(--text-primary, #1a1a1a);">
  <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; margin-bottom:12px; font-size:14px;">
    <div>自分　γ₁: <b><span id="g1Val">60</span>°</b>　γ₂: <b><span id="g2Val">120</span>°</b><br>
      <input id="g1" type="range" min="5" max="175" value="60" step="1" style="width:120px;">
      <input id="g2" type="range" min="5" max="175" value="120" step="1" style="width:120px;"><br>
      <span style="font-size:12.5px;">長さ r₁,r₂:</span>
      <input id="r1" type="range" min="0.1" max="3" value="1" step="0.1" style="width:120px;">
      <input id="r2" type="range" min="0.1" max="3" value="1" step="0.1" style="width:120px;">
    </div>
    <div>相手　δ₃: <b><span id="d3Val">40</span>°</b>　δ₄: <b><span id="d4Val">140</span>°</b><br>
      <input id="d3" type="range" min="5" max="175" value="40" step="1" style="width:120px;">
      <input id="d4" type="range" min="5" max="175" value="140" step="1" style="width:120px;"><br>
      <span style="font-size:12.5px;">長さ r₃,r₄:</span>
      <input id="r3" type="range" min="0.1" max="3" value="1" step="0.1" style="width:120px;">
      <input id="r4" type="range" min="0.1" max="3" value="1" step="0.1" style="width:120px;">
    </div>
    <div style="font-size:13px; line-height:1.5;">
      |V_i|=<span id="Ri"></span>, |V_j|=<span id="Rj"></span><br>
      2択の窓: <span id="win"></span>
    </div>
  </div>
  <svg id="plot" viewBox="0 0 640 380" style="width:100%; height:auto; display:block;"></svg>
  <div style="font-size:12.5px; margin-top:8px; display:flex; gap:18px; flex-wrap:wrap;">
    <span><span style="display:inline-block;width:14px;height:3px;background:var(--accent,#2563eb);vertical-align:middle;"></span> 本質的に2択　g=1/(|V_i||V_j|sinθ)</span>
    <span><span style="display:inline-block;width:14px;height:3px;background:var(--text-secondary,#888);vertical-align:middle;"></span> 実質一択　g=単体相性</span>
  </div>
</div>
<!-- 計算コアは CLI と共有（tools/rotating-team/model.js）。ここは描画だけ。 -->
<script src="model.js"></script>
<script>
(function(){
  const RT=window.RotatingTeam;
  const cs=getComputedStyle(document.documentElement);
  const accent=(cs.getPropertyValue('--accent')||'#2563eb').trim()||'#2563eb';
  const sec=(cs.getPropertyValue('--text-secondary')||'#888').trim()||'#888';
  const grid=(cs.getPropertyValue('--border')||'#ddd').trim()||'#ddd';
  const txt=(cs.getPropertyValue('--text-primary')||'#1a1a1a').trim()||'#1a1a1a';
  const W=640,H=380, mL=46,mR=14,mT=14,mB=34;
  const x0=mL, x1=W-mR, y0=H-mB, y1=mT;
  const ymax=1.5;
  const X=th=> x0+(th/360)*(x1-x0);
  const Y=g=> { let gg=Math.max(-ymax,Math.min(ymax,g)); return y0+(gg-(-ymax))/(ymax-(-ymax))*(y1-y0); };
  const ids=['g1','g2','d3','d4','r1','r2','r3','r4'];
  const readParams=()=>{ const p={}; ids.forEach(id=> p[id]=+document.getElementById(id).value); return p; };
  function render(){
    const p=readParams();
    document.getElementById('g1Val').textContent=p.g1;
    document.getElementById('g2Val').textContent=p.g2;
    document.getElementById('d3Val').textContent=p.d3;
    document.getElementById('d4Val').textContent=p.d4;
    // R・サンプル・2択の帯は model.js（CLI と共通）から取得
    const {Ri,Rj}=RT.radii(p);
    document.getElementById('Ri').textContent=Ri.toFixed(3);
    document.getElementById('Rj').textContent=Rj.toFixed(3);
    const pts=RT.sample(p,0.5);
    const bands=RT.bands(pts);
    document.getElementById('win').textContent =
      bands.length ? bands.map(b=>'('+b[0].toFixed(0)+'°, '+b[1].toFixed(0)+'°)').join(' と ')
                   : 'なし（全域で実質一択）';
    let svg='';
    // axes box
    svg+=`<rect x="${x0}" y="${y1}" width="${x1-x0}" height="${y0-y1}" fill="none" stroke="${grid}"/>`;
    // y gridlines at -1,-0.5,0,0.5,1
    [-1,-0.5,0,0.5,1].forEach(gy=>{
      const yy=Y(gy);
      svg+=`<line x1="${x0}" y1="${yy}" x2="${x1}" y2="${yy}" stroke="${grid}" stroke-dasharray="${gy===0?'':'2,3'}" stroke-width="${gy===0?1.2:1}"/>`;
      svg+=`<text x="${x0-6}" y="${yy+3.5}" text-anchor="end" font-size="11" fill="${sec}">${gy}</text>`;
    });
    // x gridlines every 60
    for(let th=0; th<=360; th+=60){
      const xx=X(th);
      svg+=`<line x1="${xx}" y1="${y1}" x2="${xx}" y2="${y0}" stroke="${grid}" stroke-dasharray="2,3" stroke-width="1"/>`;
      svg+=`<text x="${xx}" y="${y0+16}" text-anchor="middle" font-size="11" fill="${sec}">${th}°</text>`;
    }
    svg+=`<text x="${(x0+x1)/2}" y="${H-4}" text-anchor="middle" font-size="11.5" fill="${txt}">θ（V_j の向き）</text>`;
    svg+=`<text x="14" y="${(y0+y1)/2}" text-anchor="middle" font-size="11.5" fill="${txt}" transform="rotate(-90,14,${(y0+y1)/2})">ゲームの値 g</text>`;
    // shade two-choice bands
    bands.forEach(b=>{
      const xa=X(b[0]), xb=X(b[1]);
      svg+=`<rect x="${xa}" y="${y1}" width="${xb-xa}" height="${y0-y1}" fill="${accent}" opacity="0.07"/>`;
    });
    // curve: split into runs by regime
    let run=[]; let runTwo=pts[0].two;
    function flush(){
      if(run.length<2){run=[];return;}
      const col=runTwo?accent:sec;
      let dstr='M '+run.map(p=>X(p.th).toFixed(1)+' '+Y(p.g).toFixed(1)).join(' L ');
      svg+=`<path d="${dstr}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
      run=[];
    }
    for(let i=0;i<pts.length;i++){
      if(pts[i].two!==runTwo){ // include boundary point in both for continuity
        run.push(pts[i]); flush(); runTwo=pts[i].two; run.push(pts[i]);
      } else run.push(pts[i]);
    }
    flush();
    document.getElementById('plot').innerHTML=svg;
  }
  ids.forEach(id=> document.getElementById(id).addEventListener('input',render));
  render();
})();
</script>
