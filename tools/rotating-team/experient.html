<div id="wrap" style="font-family: var(--font-sans, system-ui, sans-serif); color: var(--text-primary, #1a1a1a);">
  <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:center; margin-bottom:12px; font-size:14px;">
    <label>自分の広がり ψ: <b><span id="psiVal">30</span>°</b><br>
      <input id="psi" type="range" min="5" max="85" value="30" step="1" style="width:160px;">
      <input id="r1" type="range" min="0.1" max="3" value="1" step="0.1" style="width:160px;">
      <input id="r2" type="range" min="0.1" max="3" value="1" step="0.1" style="width:160px;">
    </label>
    <label>相手の広がり ω: <b><span id="omeVal">50</span>°</b><br>
      <input id="ome" type="range" min="5" max="85" value="50" step="1" style="width:160px;">
      <input id="r3" type="range" min="0.1" max="3" value="1" step="0.1" style="width:160px;">
      <input id="r4" type="range" min="0.1" max="3" value="1" step="0.1" style="width:160px;">
    </label>
    <div style="font-size:13px; line-height:1.5;">
      |V_i|=<span id="Ri"></span>, |V_j|=<span id="Rj"></span><br>
      2択の窓: <span id="win"></span>
    </div>
  </div>
  <svg id="plot" viewBox="0 0 640 380" style="width:100%; height:auto; display:block;"></svg>
  <div style="font-size:12.5px; margin-top:8px; display:flex; gap:18px; flex-wrap:wrap;">
    <span><span style="display:inline-block;width:14px;height:3px;background:var(--accent,#2563eb);vertical-align:middle;"></span> 本質的に2択　g=1/(|V_i||V_j|sinθ)</span>
    <span><span style="display:inline-block;width:14px;height:3px;background:var(--text-secondary,#888);vertical-align:middle;"></span> 実質一択　g=単体相性</span>
  </div>
</div>
<script>
(function(){
  const d2r=Math.PI/180;
  const cs=getComputedStyle(document.documentElement);
  const accent=(cs.getPropertyValue('--accent')||'#2563eb').trim()||'#2563eb';
  const sec=(cs.getPropertyValue('--text-secondary')||'#888').trim()||'#888';
  const grid=(cs.getPropertyValue('--border')||'#ddd').trim()||'#ddd';
  const txt=(cs.getPropertyValue('--text-primary')||'#1a1a1a').trim()||'#1a1a1a';
  const cross=(ax,ay,bx,by)=>ax*by-ay*bx;
  function gval(th, psi, ome,r1, r2,r3,r4){
    const v1=[r1*Math.cos((90-psi)*d2r),r1*Math.sin((90-psi)*d2r)];
    const v2=[r2*Math.cos((90+psi)*d2r),r2*Math.sin((90+psi)*d2r)];
    const a3=90-ome+th, a4=90+ome+th;
    const v3=[r3*Math.cos(a3*d2r),r3*Math.sin(a3*d2r)];
    const v4=[r4*Math.cos(a4*d2r),r4*Math.sin(a4*d2r)];
    const a=cross(v1[0],v1[1],v3[0],v3[1]);
    const b=cross(v2[0],v2[1],v3[0],v3[1]);
    const c=cross(v1[0],v1[1],v4[0],v4[1]);
    const d=cross(v2[0],v2[1],v4[0],v4[1]);
    const maximin=Math.max(Math.min(a,c),Math.min(b,d));
    const minimax=Math.min(Math.max(a,b),Math.max(c,d));
    let g, two;
    if(minimax-maximin>1e-7){ g=(a*d-b*c)/(a+d-b-c); two=true; }
    else { g=maximin; two=false; }
    return {g, two};
  }
  const W=640,H=380, mL=46,mR=14,mT=14,mB=34;
  const x0=mL, x1=W-mR, y0=H-mB, y1=mT;
  const ymax=1.5;
  const X=th=> x0+(th/360)*(x1-x0);
  const Y=g=> { let gg=Math.max(-ymax,Math.min(ymax,g)); return y0+(gg-(-ymax))/(ymax-(-ymax))*(y1-y0); };
  function render(){
    const psi=+document.getElementById('psi').value;
    const ome=+document.getElementById('ome').value;
    const r1=+document.getElementById('r1').value;
    const r2=+document.getElementById('r2').value;
    const r3=+document.getElementById('r3').value;
    const r4=+document.getElementById('r4').value;
    document.getElementById('psiVal').textContent=psi;
    document.getElementById('omeVal').textContent=ome;
    const Ri=1/Math.cos(psi*d2r), Rj=1/Math.cos(ome*d2r);
    document.getElementById('Ri').textContent=Ri.toFixed(3);
    document.getElementById('Rj').textContent=Rj.toFixed(3);
    const m=Math.min(psi,ome);
    document.getElementById('win').textContent='('+(90-m)+'°, '+(90+m)+'°) と ('+(270-m)+'°, '+(270+m)+'°)';
    // sample
    const pts=[];
    for(let th=0; th<=360; th+=0.5){ const r=gval(th,psi,ome,r1,r2,r3,r4); pts.push({th, g:r.g, two:r.two}); }
    let svg='';
    // axes box
    svg+=`<rect x="${x0}" y="${y1}" width="${x1-x0}" height="${y0-y1}" fill="none" stroke="${grid}"/>`;
    // y gridlines at -1,-0.5,0,0.5,1
    [-1,-0.5,0,0.5,1].forEach(gy=>{
      const yy=Y(gy);
      svg+=`<line x1="${x0}" y1="${yy}" x2="${x1}" y2="${yy}" stroke="${grid}" stroke-dasharray="${gy===0?'':'2,3'}" stroke-width="${gy===0?1.2:1}"/>`;
      svg+=`<text x="${x0-6}" y="${yy+3.5}" text-anchor="end" font-size="11" fill="${sec}">${gy}</text>`;
    });
    // x gridlines every 60
    for(let th=0; th<=360; th+=60){
      const xx=X(th);
      svg+=`<line x1="${xx}" y1="${y1}" x2="${xx}" y2="${y0}" stroke="${grid}" stroke-dasharray="2,3" stroke-width="1"/>`;
      svg+=`<text x="${xx}" y="${y0+16}" text-anchor="middle" font-size="11" fill="${sec}">${th}°</text>`;
    }
    svg+=`<text x="${(x0+x1)/2}" y="${H-4}" text-anchor="middle" font-size="11.5" fill="${txt}">θ（V_j の向き）</text>`;
    svg+=`<text x="14" y="${(y0+y1)/2}" text-anchor="middle" font-size="11.5" fill="${txt}" transform="rotate(-90,14,${(y0+y1)/2})">ゲームの値 g</text>`;
    // shade two-choice bands
    const mm=Math.min(psi,ome);
    [[90-mm,90+mm],[270-mm,270+mm]].forEach(b=>{
      const xa=X(b[0]), xb=X(b[1]);
      svg+=`<rect x="${xa}" y="${y1}" width="${xb-xa}" height="${y0-y1}" fill="${accent}" opacity="0.07"/>`;
    });
    // curve: split into runs by regime
    let run=[]; let runTwo=pts[0].two;
    function flush(){
      if(run.length<2){run=[];return;}
      const col=runTwo?accent:sec;
      let dstr='M '+run.map(p=>X(p.th).toFixed(1)+' '+Y(p.g).toFixed(1)).join(' L ');
      svg+=`<path d="${dstr}" fill="none" stroke="${col}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>`;
      run=[];
    }
    for(let i=0;i<pts.length;i++){
      if(pts[i].two!==runTwo){ // include boundary point in both for continuity
        run.push(pts[i]); flush(); runTwo=pts[i].two; run.push(pts[i]);
      } else run.push(pts[i]);
    }
    flush();
    document.getElementById('plot').innerHTML=svg;
  }
  document.getElementById('psi').addEventListener('input',render);
  document.getElementById('ome').addEventListener('input',render);
  document.getElementById('r1').addEventListener('input',render);
  document.getElementById('r2').addEventListener('input',render);
  document.getElementById('r3').addEventListener('input',render);
  document.getElementById('r4').addEventListener('input',render);
  render();
})();
</script>
